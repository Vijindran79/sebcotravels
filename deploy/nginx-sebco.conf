map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS redirect (after cert is in place)
server {
    listen 80;
    listen [::]:80;
    server_name sebcotravels.co.uk www.sebcotravels.co.uk;

    # ACME challenge path for Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# SEBCO Travels — main vhost
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sebcotravels.co.uk www.sebcotravels.co.uk;

    root /var/www/sebcotravels/dist;
    index index.html;

    # === SSL: populated by certbot on first run ===
    ssl_certificate     /etc/letsencrypt/live/sebcotravels.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sebcotravels.co.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # === Security headers ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # === Long cache for fingerprinted assets (Vite hashes the file names) ===
    location ~* \.(?:css|js|woff2?|svg|png|jpe?g|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # === Service worker / manifest must NOT be cached aggressively ===
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
    }

    # === Backend API + Socket.io reverse proxy ===
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 86400s;
    }
    location /health {
        proxy_pass http://127.0.0.1:4000/health;
        access_log off;
    }

    # === SPA fallback: any unknown path -> index.html ===
    location / {
        try_files $uri $uri/ /index.html;
    }
}
