    <style>
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', 'Open Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Montserrat', sans-serif;
        letter-spacing: -0.02em;
      }
      /* Subtle scroll-in fade for sections */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.7s ease-out, transform 0.7s ease-out; }
      .reveal-in { opacity: 1; transform: translateY(0); }
      /* Premium shimmer for the gold CTA on first paint */
      @keyframes goldShimmer {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }
      /* Hide scrollbar but keep scroll for horizontal carousels */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      /* Hero gradient overlay */
      .hero-overlay {
        background: linear-gradient(180deg, rgba(15,23,42,0.55) 0%, rgba(15,23,42,0.85) 100%);
      }
      /* Gold underline accent */
      .gold-underline::after {
        content: '';
        display: block;
        width: 64px;
        height: 3px;
        background: #D4AF37;
        margin: 12px auto 0;
        border-radius: 2px;
      }
      /* Sticky mobile CTA shadow */
      .mobile-cta-shadow {
        box-shadow: 0 -8px 24px rgba(0,0,0,0.25);
      }
    </style>
