  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
    "react/": "https://esm.sh/react@^19.1.1/",

  }
}
</script>

    <!-- Structured data: LocalBusiness + Service.
         Update the address, geo, telephone, and aggregateRating with real values. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TaxiService",
      "name": "SEBCO Travels",
      "image": "https://sebcotravels.co.uk/og-image.jpg",
      "@id": "https://sebcotravels.co.uk/#business",
      "url": "https://sebcotravels.co.uk/",
      "telephone": "+447411113636",
      "email": "caniseb1@gmail.com",
      "priceRange": "££",
      "currenciesAccepted": "GBP",
      "paymentAccepted": "Credit Card, Debit Card, Bank Transfer",
      "areaServed": [
        { "@type": "Country", "name": "United Kingdom" }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "GB"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
          "opens": "00:00",
          "closes": "23:59"
        }
      ],
      "vehicle": [
        {
          "@type": "Vehicle",
          "name": "Black Citroën SpaceTourer",
          "vehicleConfiguration": "Executive 8-seat people carrier",
          "color": "Black",
          "brand": { "@type": "Brand", "name": "Citroën" },
          "model": "SpaceTourer",
          "seatingCapacity": 8,
          "fuelType": "Diesel"
        }
      ]
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Pre-booked airport and family taxi transfers",
      "provider": { "@id": "https://sebcotravels.co.uk/#business" },
      "areaServed": "United Kingdom",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "SEBCO Travels services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Airport transfer (Heathrow, Gatwick, Stansted, Luton)" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Family group transfer with child seats" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Corporate executive chauffeur" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Special events and weddings" } }
        ]
      }
    }
    </script>
</head>
